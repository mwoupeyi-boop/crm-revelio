<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Revelio Romandie</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts@2.10.0/umd/Recharts.min.js"></script>
    <script src="https://unpkg.com/lucide-react@0.263.1/dist/umd/lucide-react.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .recharts-wrapper { font-family: 'Inter', sans-serif !important; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell } = Recharts;
        const { Search, Plus, Mail, Phone, Calendar, CheckSquare, Bell, FileText, Users, TrendingUp, Target, Filter, Settings, ChevronRight, MoreVertical, Edit2, Trash2, Clock, Send, Linkedin, MessageSquare, X } = lucideReact;

        const CRMDashboard = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedProspect, setSelectedProspect] = useState(null);
            const [showAddModal, setShowAddModal] = useState(false);
            const [filterSegment, setFilterSegment] = useState('all');
            
            // Sample data
            const [prospects, setProspects] = useState([
                { id: 1, entreprise: 'SINEF SA', contact: 'Direction', email: 'step.fribourg@sinef.ch', tel: '+41 26 350 11 11', statut: 'Nouveau', segment: 'STEP', canton: 'FR', valeur: 85000, priorite: 'A', score: 85, emails: 0, appels: 0 },
                { id: 2, entreprise: 'CCHE Lausanne SA', contact: '', email: 'lausanne@cche.ch', tel: '+41 21 321 44 66', statut: 'Contacté', segment: 'Architecte', canton: 'VD', valeur: 45000, priorite: 'A', score: 72, emails: 1, appels: 0 },
                { id: 3, entreprise: 'Planzer Penthalaz', contact: '', email: 'penthalaz@planzer.ch', tel: '+41 21 802 64 64', statut: 'Qualifié', segment: 'Transport', canton: 'VD', valeur: 120000, priorite: 'A', score: 90, emails: 2, appels: 1 },
                { id: 4, entreprise: 'Naef Immobilier', contact: '', email: 'geneve@naef.ch', tel: '', statut: 'Proposition', segment: 'Promoteur', canton: 'GE', valeur: 95000, priorite: 'A', score: 88, emails: 3, appels: 2 },
                { id: 5, entreprise: 'Migros Vaud', contact: '', email: 'info@migros-vaud.ch', tel: '', statut: 'Négociation', segment: 'Distribution', canton: 'VD', valeur: 180000, priorite: 'A', score: 95, emails: 5, appels: 3 },
                { id: 6, entreprise: 'STEP Pensier', contact: 'Pascal Lottaz', email: 'exploitation@steppensier.ch', tel: '+41 26 684 34 13', statut: 'Nouveau', segment: 'STEP', canton: 'FR', valeur: 55000, priorite: 'A', score: 70, emails: 0, appels: 0 },
            ]);

            const [tasks, setTasks] = useState([
                { id: 1, task: 'Envoyer Email 1 - Architectes', date: '04/03/2026', priorite: 'urgent', categorie: 'Email', done: false },
                { id: 2, task: 'Appeler SINEF SA', date: '05/03/2026', priorite: 'urgent', categorie: 'Appel', prospect: 'SINEF SA', done: false },
                { id: 3, task: 'Préparer proposition Planzer', date: '07/03/2026', priorite: 'important', categorie: 'Proposition', done: false },
                { id: 4, task: 'Relance promoteurs', date: '10/03/2026', priorite: 'normal', categorie: 'Relance', done: false },
                { id: 5, task: 'Post LinkedIn - Projet ASTRA', date: '06/03/2026', priorite: 'normal', categorie: 'LinkedIn', done: false },
            ]);

            const [activities] = useState([
                { id: 1, date: '03/03/2026', type: 'Email', entreprise: 'Migros Vaud', resume: 'Envoi proposition finale', reponse: 'En attente' },
                { id: 2, date: '02/03/2026', type: 'Appel', entreprise: 'Planzer', resume: 'Discussion technique PV', reponse: 'Positif' },
                { id: 3, date: '01/03/2026', type: 'RDV', entreprise: 'Naef Immobilier', resume: 'Présentation offre', reponse: 'Intéressé' },
            ]);

            const pipelineStats = {
                nouveau: prospects.filter(p => p.statut === 'Nouveau').length,
                contacte: prospects.filter(p => p.statut === 'Contacté').length,
                qualifie: prospects.filter(p => p.statut === 'Qualifié').length,
                proposition: prospects.filter(p => p.statut === 'Proposition').length,
                negociation: prospects.filter(p => p.statut === 'Négociation').length,
                gagne: prospects.filter(p => p.statut === 'Gagné').length,
            };

            const totalValue = prospects.filter(p => p.statut !== 'Perdu').reduce((sum, p) => sum + p.valeur, 0);
            const tasksDueToday = tasks.filter(t => t.date === '04/03/2026' && !t.done).length;

            const segmentData = [
                { name: 'Architecte', value: prospects.filter(p => p.segment === 'Architecte').length, color: '#3B82F6' },
                { name: 'Promoteur', value: prospects.filter(p => p.segment === 'Promoteur').length, color: '#10B981' },
                { name: 'STEP', value: prospects.filter(p => p.segment === 'STEP').length, color: '#8B5CF6' },
                { name: 'Distribution', value: prospects.filter(p => p.segment === 'Distribution').length, color: '#F59E0B' },
                { name: 'Transport', value: prospects.filter(p => p.segment === 'Transport').length, color: '#EF4444' },
            ];

            const pipelineData = [
                { name: 'Nouveau', value: pipelineStats.nouveau, color: '#BDD7EE' },
                { name: 'Contacté', value: pipelineStats.contacte, color: '#FFE699' },
                { name: 'Qualifié', value: pipelineStats.qualifie, color: '#C6EFCE' },
                { name: 'Proposition', value: pipelineStats.proposition, color: '#F4B084' },
                { name: 'Négociation', value: pipelineStats.negociation, color: '#B4A7D6' },
                { name: 'Gagné', value: pipelineStats.gagne, color: '#70AD47' },
            ];

            const getStatusColor = (statut) => {
                const colors = {
                    'Nouveau': 'bg-blue-100 text-blue-800',
                    'Contacté': 'bg-yellow-100 text-yellow-800',
                    'Qualifié': 'bg-green-100 text-green-800',
                    'Proposition': 'bg-orange-100 text-orange-800',
                    'Négociation': 'bg-purple-100 text-purple-800',
                    'Gagné': 'bg-green-500 text-white',
                    'Perdu': 'bg-red-100 text-red-800',
                };
                return colors[statut] || 'bg-gray-100 text-gray-800';
            };

            const getPriorityColor = (priorite) => {
                const colors = { 'urgent': 'bg-red-500', 'important': 'bg-orange-500', 'normal': 'bg-yellow-500' };
                return colors[priorite] || 'bg-gray-500';
            };

            const tabs = [
                { id: 'dashboard', label: 'Dashboard', icon: TrendingUp },
                { id: 'pipeline', label: 'Pipeline', icon: Target },
                { id: 'tasks', label: 'Tâches', icon: CheckSquare },
                { id: 'templates', label: 'Templates', icon: FileText },
            ];

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <header className="bg-blue-900 text-white shadow-lg">
                        <div className="px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <h1 className="text-xl font-bold">🎯 CRM REVELIO ROMANDIE</h1>
                                <span className="text-sm opacity-75">Emch+Berger Revelio AG</span>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="relative">
                                    <Bell className="w-5 h-5 cursor-pointer hover:opacity-80" />
                                    {tasksDueToday > 0 && (
                                        <span className="absolute -top-1 -right-1 bg-red-500 text-xs w-4 h-4 rounded-full flex items-center justify-center">
                                            {tasksDueToday}
                                        </span>
                                    )}
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className="w-8 h-8 bg-white bg-opacity-20 rounded-full flex items-center justify-center text-sm font-bold">MW</div>
                                    <span className="text-sm">Michel Woupeyi</span>
                                </div>
                            </div>
                        </div>
                        
                        <nav className="px-6 flex gap-1">
                            {tabs.map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`px-4 py-2 flex items-center gap-2 text-sm font-medium rounded-t-lg transition-colors ${
                                        activeTab === tab.id ? 'bg-white text-blue-900' : 'text-white text-opacity-80 hover:text-white hover:bg-white hover:bg-opacity-10'
                                    }`}
                                >
                                    <tab.icon className="w-4 h-4" />
                                    {tab.label}
                                </button>
                            ))}
                        </nav>
                    </header>

                    <main className="p-6">
                        {/* DASHBOARD */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-6 gap-4">
                                    {[
                                        { label: 'Total Prospects', value: prospects.length, color: 'bg-blue-50 border-blue-200', icon: Users },
                                        { label: 'Nouveaux', value: pipelineStats.nouveau, color: 'bg-blue-100 border-blue-300', icon: Plus },
                                        { label: 'En Contact', value: pipelineStats.contacte, color: 'bg-yellow-50 border-yellow-200', icon: Mail },
                                        { label: 'Qualifiés', value: pipelineStats.qualifie, color: 'bg-green-50 border-green-200', icon: CheckSquare },
                                        { label: 'Négociation', value: pipelineStats.negociation, color: 'bg-purple-50 border-purple-200', icon: MessageSquare },
                                        { label: 'Pipeline CHF', value: `${(totalValue/1000).toFixed(0)}K`, color: 'bg-green-100 border-green-200', icon: TrendingUp },
                                    ].map((kpi, i) => (
                                        <div key={i} className={`${kpi.color} border rounded-xl p-4`}>
                                            <div className="flex items-center justify-between mb-2">
                                                <span className="text-xs text-gray-500 uppercase font-medium">{kpi.label}</span>
                                                <kpi.icon className="w-4 h-4 text-gray-400" />
                                            </div>
                                            <div className="text-2xl font-bold text-gray-800">{kpi.value}</div>
                                        </div>
                                    ))}
                                </div>

                                <div className="grid grid-cols-2 gap-6">
                                    <div className="bg-white rounded-xl shadow-sm border p-6">
                                        <h3 className="font-semibold text-gray-800 mb-4">📊 Pipeline par Statut</h3>
                                        <ResponsiveContainer width="100%" height={200}>
                                            <BarChart data={pipelineData}>
                                                <CartesianGrid strokeDasharray="3 3" />
                                                <XAxis dataKey="name" tick={{ fontSize: 11 }} />
                                                <YAxis />
                                                <Tooltip />
                                                <Bar dataKey="value" fill="#1F4E79" radius={[4, 4, 0, 0]}>
                                                    {pipelineData.map((entry, index) => (
                                                        <Cell key={index} fill={entry.color} />
                                                    ))}
                                                </Bar>
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>

                                    <div className="bg-white rounded-xl shadow-sm border p-6">
                                        <h3 className="font-semibold text-gray-800 mb-4">📈 Répartition par Segment</h3>
                                        <ResponsiveContainer width="100%" height={200}>
                                            <PieChart>
                                                <Pie data={segmentData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={70} label={({ name, value }) => `${name}: ${value}`}>
                                                    {segmentData.map((entry, index) => (
                                                        <Cell key={index} fill={entry.color} />
                                                    ))}
                                                </Pie>
                                                <Tooltip />
                                            </PieChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-6">
                                    <div className="bg-white rounded-xl shadow-sm border p-6">
                                        <div className="flex items-center justify-between mb-4">
                                            <h3 className="font-semibold text-gray-800">⚠️ Tâches à Faire</h3>
                                        </div>
                                        <div className="space-y-2">
                                            {tasks.filter(t => !t.done).slice(0, 5).map(task => (
                                                <div key={task.id} className="flex items-center gap-3 p-2 hover:bg-gray-50 rounded-lg">
                                                    <input type="checkbox" checked={task.done} onChange={() => setTasks(tasks.map(t => t.id === task.id ? {...t, done: !t.done} : t))} className="w-4 h-4 rounded" />
                                                    <div className={`w-2 h-2 rounded-full ${getPriorityColor(task.priorite)}`}></div>
                                                    <div className="flex-1">
                                                        <div className="text-sm font-medium">{task.task}</div>
                                                        <div className="text-xs text-gray-500">{task.date} • {task.categorie}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-xl shadow-sm border p-6">
                                        <h3 className="font-semibold text-gray-800 mb-4">📧 Activités Récentes</h3>
                                        <div className="space-y-3">
                                            {activities.map(act => (
                                                <div key={act.id} className="flex items-start gap-3 p-2 hover:bg-gray-50 rounded-lg">
                                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center text-white text-xs ${act.type === 'Email' ? 'bg-blue-500' : act.type === 'Appel' ? 'bg-green-500' : 'bg-purple-500'}`}>
                                                        {act.type === 'Email' ? <Mail className="w-4 h-4" /> : act.type === 'Appel' ? <Phone className="w-4 h-4" /> : <Calendar className="w-4 h-4" />}
                                                    </div>
                                                    <div className="flex-1">
                                                        <div className="text-sm font-medium">{act.entreprise}</div>
                                                        <div className="text-xs text-gray-500">{act.resume}</div>
                                                        <div className="text-xs text-gray-400">{act.date}</div>
                                                    </div>
                                                    <span className={`text-xs px-2 py-1 rounded ${act.reponse === 'Positif' ? 'bg-green-100 text-green-700' : act.reponse === 'En attente' ? 'bg-yellow-100 text-yellow-700' : 'bg-blue-100 text-blue-700'}`}>
                                                        {act.reponse}
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* PIPELINE */}
                        {activeTab === 'pipeline' && (
                            <div className="space-y-4">
                                <div className="flex items-center justify-between">
                                    <div className="flex items-center gap-4">
                                        <div className="relative">
                                            <Search className="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" />
                                            <input type="text" placeholder="Rechercher..." className="pl-10 pr-4 py-2 border rounded-lg text-sm w-64 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                        </div>
                                        <select value={filterSegment} onChange={(e) => setFilterSegment(e.target.value)} className="border rounded-lg px-3 py-2 text-sm">
                                            <option value="all">Tous les segments</option>
                                            <option value="Architecte">Architecte</option>
                                            <option value="Promoteur">Promoteur</option>
                                            <option value="STEP">STEP</option>
                                            <option value="Distribution">Distribution</option>
                                        </select>
                                    </div>
                                    <button className="bg-blue-900 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 hover:bg-blue-800">
                                        <Plus className="w-4 h-4" /> Nouveau Prospect
                                    </button>
                                </div>

                                <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
                                    <table className="w-full">
                                        <thead className="bg-gray-50 border-b">
                                            <tr>
                                                {['Entreprise', 'Contact', 'Statut', 'Segment', 'Canton', 'Valeur', 'Score', 'Actions'].map(h => (
                                                    <th key={h} className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">{h}</th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y">
                                            {prospects.filter(p => filterSegment === 'all' || p.segment === filterSegment).map(prospect => (
                                                <tr key={prospect.id} className="hover:bg-gray-50 cursor-pointer" onClick={() => setSelectedProspect(prospect)}>
                                                    <td className="px-4 py-3">
                                                        <div className="font-medium text-gray-900">{prospect.entreprise}</div>
                                                        <div className="text-sm text-gray-500">{prospect.email}</div>
                                                    </td>
                                                    <td className="px-4 py-3 text-sm text-gray-600">{prospect.contact || '-'}</td>
                                                    <td className="px-4 py-3">
                                                        <span className={`px-2 py-1 rounded-full text-xs font-medium ${getStatusColor(prospect.statut)}`}>{prospect.statut}</span>
                                                    </td>
                                                    <td className="px-4 py-3 text-sm text-gray-600">{prospect.segment}</td>
                                                    <td className="px-4 py-3 text-sm text-gray-600">{prospect.canton}</td>
                                                    <td className="px-4 py-3 text-sm font-medium">{prospect.valeur.toLocaleString()} CHF</td>
                                                    <td className="px-4 py-3">
                                                        <div className="flex items-center gap-2">
                                                            <div className="w-12 bg-gray-200 rounded-full h-2">
                                                                <div className={`h-2 rounded-full ${prospect.score >= 80 ? 'bg-green-500' : prospect.score >= 60 ? 'bg-yellow-500' : 'bg-red-500'}`} style={{ width: `${prospect.score}%` }}></div>
                                                            </div>
                                                            <span className="text-xs text-gray-500">{prospect.score}</span>
                                                        </div>
                                                    </td>
                                                    <td className="px-4 py-3">
                                                        <div className="flex items-center gap-2">
                                                            <button className="p-1 hover:bg-blue-100 rounded text-blue-600" title="Email"><Mail className="w-4 h-4" /></button>
                                                            <button className="p-1 hover:bg-green-100 rounded text-green-600" title="Appeler"><Phone className="w-4 h-4" /></button>
                                                            <button className="p-1 hover:bg-purple-100 rounded text-purple-600" title="RDV"><Calendar className="w-4 h-4" /></button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* TASKS */}
                        {activeTab === 'tasks' && (
                            <div className="grid grid-cols-3 gap-6">
                                <div className="bg-white rounded-xl shadow-sm border p-4">
                                    <h3 className="font-semibold text-gray-700 mb-3 flex items-center gap-2">
                                        <span className="w-3 h-3 bg-red-500 rounded-full"></span>
                                        À Faire ({tasks.filter(t => !t.done).length})
                                    </h3>
                                    <div className="space-y-2">
                                        {tasks.filter(t => !t.done).map(task => (
                                            <div key={task.id} className="p-3 bg-gray-50 rounded-lg border-l-4 border-l-red-500">
                                                <div className="flex items-start justify-between">
                                                    <div>
                                                        <div className="font-medium text-sm">{task.task}</div>
                                                        <div className="text-xs text-gray-500 mt-1">{task.date} • {task.categorie}</div>
                                                    </div>
                                                    <button onClick={() => setTasks(tasks.map(t => t.id === task.id ? {...t, done: true} : t))} className="text-gray-400 hover:text-green-500">
                                                        <CheckSquare className="w-4 h-4" />
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white rounded-xl shadow-sm border p-4">
                                    <h3 className="font-semibold text-gray-700 mb-3 flex items-center gap-2">
                                        <span className="w-3 h-3 bg-orange-500 rounded-full"></span>
                                        Urgent ({tasks.filter(t => t.priorite === 'urgent' && !t.done).length})
                                    </h3>
                                    <div className="space-y-2">
                                        {tasks.filter(t => t.priorite === 'urgent' && !t.done).map(task => (
                                            <div key={task.id} className="p-3 bg-orange-50 rounded-lg border-l-4 border-l-orange-500">
                                                <div className="font-medium text-sm">{task.task}</div>
                                                <div className="text-xs text-gray-500 mt-1">{task.date}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white rounded-xl shadow-sm border p-4">
                                    <h3 className="font-semibold text-gray-700 mb-3 flex items-center gap-2">
                                        <span className="w-3 h-3 bg-green-500 rounded-full"></span>
                                        Terminé ({tasks.filter(t => t.done).length})
                                    </h3>
                                    <div className="space-y-2">
                                        {tasks.filter(t => t.done).map(task => (
                                            <div key={task.id} className="p-3 bg-green-50 rounded-lg border-l-4 border-l-green-500 opacity-60">
                                                <div className="font-medium text-sm line-through">{task.task}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TEMPLATES */}
                        {activeTab === 'templates' && (
                            <div className="grid grid-cols-3 gap-6">
                                <div className="bg-white rounded-xl shadow-sm border p-6">
                                    <div className="flex items-center gap-2 mb-4">
                                        <Mail className="w-5 h-5 text-blue-600" />
                                        <h3 className="font-semibold text-gray-800">Templates Email</h3>
                                    </div>
                                    <div className="space-y-3">
                                        {['Email 1 - Architectes', 'Email 1 - Promoteurs', 'Email 1 - STEP', 'Email Relance'].map(t => (
                                            <button key={t} className="w-full text-left px-3 py-2 rounded-lg hover:bg-blue-50 text-sm flex items-center justify-between group">
                                                {t}
                                                <ChevronRight className="w-4 h-4 text-gray-400 group-hover:text-blue-600" />
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white rounded-xl shadow-sm border p-6">
                                    <div className="flex items-center gap-2 mb-4">
                                        <Linkedin className="w-5 h-5 text-blue-600" />
                                        <h3 className="font-semibold text-gray-800">Posts LinkedIn</h3>
                                    </div>
                                    <div className="space-y-3">
                                        {['Post Projet', 'Post Expertise', 'Message Connexion'].map(t => (
                                            <button key={t} className="w-full text-left px-3 py-2 rounded-lg hover:bg-blue-50 text-sm flex items-center justify-between group">
                                                {t}
                                                <ChevronRight className="w-4 h-4 text-gray-400 group-hover:text-blue-600" />
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white rounded-xl shadow-sm border p-6">
                                    <div className="flex items-center gap-2 mb-4">
                                        <FileText className="w-5 h-5 text-purple-600" />
                                        <h3 className="font-semibold text-gray-800">Newsletters</h3>
                                    </div>
                                    <div className="space-y-3">
                                        {['Newsletter Mensuelle', 'Annonce Projet'].map(t => (
                                            <button key={t} className="w-full text-left px-3 py-2 rounded-lg hover:bg-purple-50 text-sm flex items-center justify-between group">
                                                {t}
                                                <ChevronRight className="w-4 h-4 text-gray-400 group-hover:text-purple-600" />
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Prospect Sidebar */}
                    {selectedProspect && (
                        <div className="fixed inset-y-0 right-0 w-96 bg-white shadow-2xl border-l z-50 overflow-y-auto">
                            <div className="p-6">
                                <div className="flex items-center justify-between mb-6">
                                    <h3 className="font-bold text-lg">{selectedProspect.entreprise}</h3>
                                    <button onClick={() => setSelectedProspect(null)} className="text-gray-400 hover:text-gray-600">
                                        <X className="w-5 h-5" />
                                    </button>
                                </div>
                                
                                <div className="space-y-4">
                                    <span className={`inline-block px-3 py-1 rounded-full text-sm font-medium ${getStatusColor(selectedProspect.statut)}`}>{selectedProspect.statut}</span>
                                    
                                    <div className="grid grid-cols-2 gap-4 text-sm">
                                        <div><span className="text-gray-500">Segment:</span><br/>{selectedProspect.segment}</div>
                                        <div><span className="text-gray-500">Canton:</span><br/>{selectedProspect.canton}</div>
                                        <div><span className="text-gray-500">Valeur:</span><br/>{selectedProspect.valeur.toLocaleString()} CHF</div>
                                        <div><span className="text-gray-500">Score:</span><br/>{selectedProspect.score}/100</div>
                                    </div>

                                    <div className="border-t pt-4">
                                        <div className="text-sm text-gray-500 mb-1">Email</div>
                                        <a href={`mailto:${selectedProspect.email}`} className="text-blue-600 hover:underline">{selectedProspect.email}</a>
                                    </div>

                                    {selectedProspect.tel && (
                                        <div>
                                            <div className="text-sm text-gray-500 mb-1">Téléphone</div>
                                            <a href={`tel:${selectedProspect.tel}`} className="text-blue-600 hover:underline">{selectedProspect.tel}</a>
                                        </div>
                                    )}

                                    <div className="flex gap-2 pt-4">
                                        <button className="flex-1 bg-blue-600 text-white py-2 rounded-lg text-sm flex items-center justify-center gap-2 hover:bg-blue-700">
                                            <Mail className="w-4 h-4" /> Email
                                        </button>
                                        <button className="flex-1 bg-green-600 text-white py-2 rounded-lg text-sm flex items-center justify-center gap-2 hover:bg-green-700">
                                            <Phone className="w-4 h-4" /> Appeler
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="fixed bottom-0 left-0 right-0 bg-gray-100 border-t px-6 py-2 text-xs text-gray-500 flex items-center justify-between">
                        <span>CRM Revelio Romandie • Michel Woupeyi • Emch+Berger Revelio AG</span>
                        <span>Version Web</span>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<CRMDashboard />);
    </script>
</body>
</html>
